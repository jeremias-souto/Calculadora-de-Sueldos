<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Sueldos</title>
    <style>
        /* Estilos básicos para ocultar y centrar */
        #calculator-screen { display: none; }
        .login-container {
            max-width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            text-align: center;
        }
        .error-msg { color: red; display: none; margin-top: 10px; font-size: 14px; }
        
        /* Estilo para el cartel del Total General */
        #summary-container {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 4px solid #2c3e50;
            display: none;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="login-container">
        <h2>Acceso Restringido</h2>
        <p>Usuario:</p>
        <input type="text" id="usernameInput">
        
        <p>Contraseña:</p>
        <input type="password" id="passwordInput">
        
        <br><br>
        <button id="login-button">Ingresar</button>
        <p id="login-error" class="error-msg">Usuario o contraseña incorrectos</p>
    </div>

    <div id="calculator-screen">
        <h1 class="title">Calculadora de Sueldos</h1>
        
        <div class="container">
            <div class="box">
                <p class="option-name">Precio por hora (normal)</p>
                <input id="pricePerHour" class="option-input" type="number" min="0" value="0">
            </div>
            <div class="box">
                <p class="option-name">Precio por hora extra</p>
                <input id="pricePerExtraHour" class="option-input" type="number" min="0" value="0">
            </div>
            <div class="box">
                <p class="option-name">Porcentaje de sueldo en blanco (%)</p>
                <input id="percentageWhiteSalary" class="option-input" type="number" min="0" max="100" value="0">
            </div>
        </div>

        <br>
        <p class="option-name">Selecciona tu archivo CSV de la nómina:</p>
        <input type="file" id="csvFileInput" accept=".csv">
        
        <br><br>
        <button id="calculate-button">Calcular y Descargar</button>
        <br><br>
        <span id="result" style="font-weight: bold; color: green;"></span>

        <div id="summary-container">
            <h3 style="margin-top: 0; color: #2c3e50;">Resumen de Nómina:</h3>
            <p style="font-size: 1.2em; margin-bottom: 0;">
                <strong>Total Bruto a abonar: </strong> $<span id="grand-total-display">0</span>
            </p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
