<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Sueldos</title>
    <style>
        /* hacelo si queres dsp en css */
        * {
            text-align: center;
            color: #222;
            background-color: #fefefe;
            font-family: system-ui;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 70vw;
            margin: 0 auto;
            border: 2px solid #225599;
            border-radius: 25px;
            padding: 20px 0; 
        }

        .box {
            width: 250px;
            height: 175px;
        }

        
        input {
            width: 150px;
            text-align: left;
            border: 1px solid #ccc;
            padding: 5px;
        }

        .calculate-button {
            margin-top: 25px;
            padding: 10px 20px;
            color: #fefefe;
            font-size: 1.1rem;
            background-color: #225599;
            border: 2px solid #225599;
            border-radius: 5px;
            cursor: pointer;
            transition: ease-in-out .25s;
        }

        .calculate-button:hover {
            color: #225599;
            background-color: #fefefe;
        }

        /* lo mismo con esto es un login basico, si queres hacelo dsp en css*/

        #calculator-screen { display: none; }
        
        .login-container {
            max-width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 2px solid #225599; 
            border-radius: 25px;
            text-align: center;
        }
        
        .error-msg { color: red; display: none; margin-top: 10px; font-size: 14px; }
         /* creo q esto anula el resultado que pusiste vos, pasa que lo subo directo en el csv*/
        #result, #summary-container {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="login-container">
        <h2>Acceso Restringido</h2>
        <p>Usuario:</p>
        <input type="text" id="usernameInput">
        
        <p>Contraseña:</p>
        <input type="password" id="passwordInput">
        
        <br><br>
        <button id="login-button" class="calculate-button">Ingresar</button>
        <p id="login-error" class="error-msg">Usuario o contraseña incorrectos</p>
    </div>

    <div id="calculator-screen">
        <h1 class="title">Calculadora de Sueldos</h1>
        
        <div class="container">
            <div class="box">
                <p class="option-name">Precio por hora (normal)</p>
                <input id="pricePerHour" class="option-input" type="number" min="0" value="0">
            </div>
            <div class="box">
                <p class="option-name">Precio por hora extra</p>
                <input id="pricePerExtraHour" class="option-input" type="number" min="0" value="0">
            </div>
            <div class="box">
                <p class="option-name">Porcentaje de sueldo en blanco (%)</p>
                <input id="percentageWhiteSalary" class="option-input" type="number" min="0" max="100" value="0">
            </div>
        </div>

        <br>
        <p class="option-name">Selecciona tu archivo CSV de la nómina:</p>
        <input type="file" id="csvFileInput" accept=".csv" style="width: 250px;">
        
        <br><br>
        <button id="calculate-button" class="calculate-button">Calcular y Descargar</button>
        
        <span id="result"></span>
        <div id="summary-container">
            <span id="grand-total-display"></span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
