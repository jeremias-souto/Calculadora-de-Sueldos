<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Sueldos</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1 class="title">Calculadora de Sueldos</h1>

    <p class="option-name">Precio por hora</p>
    <input id="pricePerHour" class="option-input" type="number" min="0" value="0">

    <p class="option-name">Horas trabajadas</p>
    <input id="workedHours" class="option-input" type="number" min="0" value="0">

    <p class="option-name">Precio por hora extra</p>
    <input id="pricePerExtraHour" class="option-input" type="number" min="0" value="0">

    <p class="option-name">Horas extras trabajadas</p>
    <input id="workedExtraHours" class="option-input" type="number" min="0" value="0">

    <p class="option-name">Extra por presencialidad</p>
    <input id="attendanceExtra" class="option-input" type="number" min="0" value="0">

    <p class="option-name">Porcentaje de sueldo en blanco</p>
    <input id="percentageWhiteSalary" class="option-input" type="number" min="0" max="100" value="0">

    <br><br>

    <button id="calculate-button">Calcular</button>

    <br><br><br>

    <span id="result">Total: -</span>

    <script src="script.js"></script>

</body>

</html>
